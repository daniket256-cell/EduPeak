<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Results — EduPeak</title>
<link rel="stylesheet" href="../css/base.css"/>
<style>
body { padding-top: 70px; }
.page-hero { background: var(--ink); color: var(--cream); padding: 48px; }
.page-hero h1 { font-size: clamp(1.6rem,3vw,2.4rem); margin-bottom: 8px; }
.page-hero p { color: #ffffffaa; font-size: 0.9rem; }

.results-main { max-width: 1100px; margin: 0 auto; padding: 36px 48px; }

/* OVERVIEW STATS */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 36px; }
.ov-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: center; }
.ov-num { font-family: 'Playfair Display',serif; font-size: 1.9rem; font-weight: 900; }
.ov-label { font-size: 0.76rem; color: var(--muted); margin-top: 4px; }

/* CHART */
.chart-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; }
.chart-card h3 { font-family:'DM Sans',sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 20px; }
.bar-chart { display: flex; gap: 12px; align-items: flex-end; height: 120px; }
.chart-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.chart-bar { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.5s ease; min-height: 4px; }
.chart-bar-label { font-size: 0.65rem; color: var(--muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.chart-bar-val { font-size: 0.7rem; font-weight: 700; color: var(--muted); }

/* RESULTS TABLE */
.results-table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.results-table-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.results-table-header h3 { font-family:'DM Sans',sans-serif; font-size: 1rem; font-weight: 700; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--cream); padding: 12px 20px; text-align: left; font-size: 0.76rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
td { padding: 14px 20px; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--cream); }
.score-pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; }
.score-pill.high { background: #d8f8e4; color: var(--success); }
.score-pill.mid { background: var(--amber-light); color: #7a4d00; }
.score-pill.low { background: #fee; color: var(--red); }

.empty-state { text-align: center; padding: 80px 24px; }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
.empty-state h3 { font-family:'DM Sans',sans-serif; font-weight: 600; margin-bottom: 8px; }
.empty-state p { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }

@media(max-width:768px){ .results-main, .page-hero { padding-left: 20px; padding-right: 20px; } table { font-size: 0.78rem; } th, td { padding: 10px 12px; } }
</style>
</head>
<body data-root="../">
<div id="nav-root"></div>

<div class="page-hero">
  <div class="section-tag">My Progress</div>
  <h1>My Results & Analytics</h1>
  <p>Track your performance across all tests. Identify strengths and weak areas.</p>
</div>

<div class="results-main">
  <div id="results-content"></div>
</div>

<script src="../js/app.js"></script>
<script>
if (!Auth.require()) {}
document.getElementById('nav-root').innerHTML = renderNav('results');
const user = Auth.getUser();

function renderResults() {
  const allResults = Store.getResults().filter(r => r.userId === user.email);
  const content = document.getElementById('results-content');

  if (!allResults.length) {
    content.innerHTML = `<div class="empty-state">
      <div class="icon">📊</div>
      <h3>No tests attempted yet</h3>
      <p>Start practising to see your performance analytics here.</p>
      <a href="tests.html" class="btn btn-primary">Browse Tests →</a>
    </div>`;
    return;
  }

  // STATS
  const totalTests = allResults.length;
  const avgScore = Math.round(allResults.reduce((s,r) => s + r.pct, 0) / totalTests);
  const bestScore = Math.max(...allResults.map(r => r.pct));
  const totalCorrect = allResults.reduce((s,r) => s + r.correct, 0);
  const totalQs = allResults.reduce((s,r) => s + r.correct + r.wrong + r.skip, 0);
  const overallAccuracy = totalQs > 0 ? Math.round((totalCorrect/totalQs)*100) : 0;

  // CHART DATA (last 8 results)
  const chartData = allResults.slice(-8);

  content.innerHTML = `
    <div class="overview-grid">
      <div class="ov-card"><div class="ov-num" style="color:var(--teal)">${totalTests}</div><div class="ov-label">Tests Attempted</div></div>
      <div class="ov-card"><div class="ov-num" style="color:var(--amber)">${avgScore}%</div><div class="ov-label">Average Score</div></div>
      <div class="ov-card"><div class="ov-num" style="color:var(--success)">${bestScore}%</div><div class="ov-label">Best Score</div></div>
      <div class="ov-card"><div class="ov-num" style="color:var(--purple)">${overallAccuracy}%</div><div class="ov-label">Overall Accuracy</div></div>
      <div class="ov-card"><div class="ov-num" style="color:var(--red)">${totalCorrect}</div><div class="ov-label">Total Correct</div></div>
    </div>

    ${chartData.length > 1 ? `
    <div class="chart-card">
      <h3>Score Trend (Last ${chartData.length} Tests)</h3>
      <div class="bar-chart" id="bar-chart"></div>
    </div>` : ''}

    <div class="results-table-wrap">
      <div class="results-table-header">
        <h3>All Attempted Tests</h3>
        <span class="badge badge-teal">${totalTests} tests</span>
      </div>
      <table>
        <thead>
          <tr><th>Test Name</th><th>Exam</th><th>Score</th><th>Correct</th><th>Wrong</th><th>Skipped</th><th>Accuracy</th><th>Date</th><th></th></tr>
        </thead>
        <tbody>
          ${allResults.slice().reverse().map(r => {
            const pill = r.pct >= 70 ? 'high' : r.pct >= 40 ? 'mid' : 'low';
            return `<tr>
              <td style="font-weight:600;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.testTitle}</td>
              <td><span class="badge badge-amber">${r.exam}</span></td>
              <td><span class="score-pill ${pill}">${r.pct}% · ${r.score}/${r.totalMarks}</span></td>
              <td style="color:var(--success);font-weight:700">✓ ${r.correct}</td>
              <td style="color:var(--red);font-weight:700">✕ ${r.wrong}</td>
              <td style="color:var(--muted)">— ${r.skip}</td>
              <td>${r.accuracy}%</td>
              <td style="color:var(--muted)">${new Date(r.submittedAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</td>
              <td><a href="exam.html?id=${r.testId}&review=1" class="btn btn-outline btn-sm">Review</a></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Render bar chart
  if (chartData.length > 1) {
    const maxPct = Math.max(...chartData.map(r => r.pct), 1);
    document.getElementById('bar-chart').innerHTML = chartData.map(r => {
      const h = Math.max(8, Math.round((r.pct / 100) * 100));
      const color = r.pct >= 70 ? 'var(--success)' : r.pct >= 40 ? 'var(--amber)' : 'var(--red)';
      return `<div class="chart-bar-wrap">
        <div class="chart-bar-val">${r.pct}%</div>
        <div class="chart-bar" style="height:${h}px;background:${color}"></div>
        <div class="chart-bar-label">${r.testTitle.split(' ').slice(0,3).join(' ')}</div>
      </div>`;
    }).join('');
  }
}

renderResults();
</script>
</body>
</html>
